version: '3.9'

# Production overrides — use with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /data/thulirix/postgres:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    image: thulirix/backend:${IMAGE_TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASS: ${DB_PASS}
      DB_USER: ${DB_USER}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend:
    image: thulirix/frontend:${IMAGE_TAG:-latest}
